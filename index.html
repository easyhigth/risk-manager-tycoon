/* ---- tâches : construire un graphe / remplir un rapport ---- */
function eid(){ return "x"+Date.now()+Math.floor(Math.random()*99999); }
function makeGraphTask(){
  const which=ri(0,2);
  if(which===0){ const vals=[]; for(let i=0;i<6;i++)vals.push(ri(60,170)); let mx=0; vals.forEach((v,i)=>{if(v>vals[mx])mx=i;});
    return {kind:"graph",id:eid(),concept:"var_param",dataKind:"values",
      boss:B("« Trace-moi l'évolution de la VaR de la semaine et dis-moi le jour de pointe. »","'Plot this week's VaR for me and tell me the peak day.'"),
      objective:B("Montrer l'évolution d'une grandeur dans le temps","Show how a quantity evolves over time"),
      labels:{fr:["J1","J2","J3","J4","J5","J6"],en:["D1","D2","D3","D4","D5","D6"]}, values:vals,
      correctKind:"line", question:B("Quel jour la VaR est-elle la plus élevée ?","Which day is VaR highest?"),
      options:["J1","J2","J3","J4","J5","J6"].map((d,i)=>B(d,"D"+(i+1))), correct:mx}; }
  if(which===1){ const vals=[ri(20,60),ri(20,60),ri(20,60),ri(20,60)]; let mx=0; vals.forEach((v,i)=>{if(v>vals[mx])mx=i;});
    return {kind:"graph",id:eid(),concept:"risk_taxonomy",dataKind:"values",
      boss:B("« Compare le poids de chaque type de risque et dis-moi lequel domine. »","'Compare each risk type's weight and tell me which dominates.'"),
      objective:B("Comparer des catégories distinctes","Compare distinct categories"),
      labels:{fr:["Marché","Crédit","Op","Liquidité"],en:["Market","Credit","Op","Liquidity"]}, values:vals,
      correctKind:"bar", question:B("Quelle catégorie de risque pèse le plus ?","Which risk category weighs most?"),
      options:[B("Marché","Market"),B("Crédit","Credit"),B("Op","Op"),B("Liquidité","Liquidity")], correct:mx}; }
  const pts=[]; for(let i=0;i<4;i++)pts.push({x:ri(2,9),y:ri(3,12)}); let mx=0; pts.forEach((p,i)=>{if(p.y/p.x>pts[mx].y/pts[mx].x)mx=i;});
  return {kind:"graph",id:eid(),concept:"raroc",dataKind:"points",
    boss:B("« Visualise rendement vs risque de nos 4 desks et dis-moi le meilleur ratio. »","'Plot return vs risk for our 4 desks and tell me the best ratio.'"),
    objective:B("Visualiser la relation entre deux variables","Visualise the relationship between two variables"),
    labels:{fr:["A","B","C","D"],en:["A","B","C","D"]}, points:pts,
    correctKind:"scatter", question:B("Quel desk offre le meilleur rendement par unité de risque ?","Which desk has the best return per unit of risk?"),
    options:["A","B","C","D"].map(d=>B("Desk "+d,"Desk "+d)), correct:mx};
}
function makeReportTask(){
  const tpl=ri(0,1);
  if(tpl===0) return {kind:"report",id:eid(),concept:"es",title:B("Note de risque de marché","Market risk note"),
    boss:B("« Complète cette note pour le comité des risques — chaque terme doit être juste. »","'Fill in this note for the risk committee — every term must be correct.'"),
    segments:[ {t:B("La VaR à 99 % estime la perte maximale attendue dans ","The 99% VaR estimates the maximum expected loss in ")},
      {blank:[B("99 %","99%"),B("1 %","1%"),B("50 %","50%")],correct:0},
      {t:B(" des cas. Comme elle ignore l'ampleur de la queue, on la complète par l'","of cases. As it ignores the size of the tail, we complement it with ")},
      {blank:[B("Expected Shortfall","Expected Shortfall"),B("la duration","duration"),B("le beta","beta")],correct:0},
      {t:B(", qui en calcule la moyenne. Sous la FRTB, le capital de marché repose sur l'","which averages it. Under FRTB, market capital relies on ")},
      {blank:[B("ES 97,5 %","97.5% ES"),B("VaR 95 %","95% VaR"),B("CAPM","CAPM")],correct:0},
      {t:B(".",".")} ]};
  return {kind:"report",id:eid(),concept:"el",title:B("Mémo de crédit","Credit memo"),
    boss:B("« Complète ce mémo crédit — une erreur et le comité refuse le dossier. »","'Fill in this credit memo — one error and the committee rejects the file.'"),
    segments:[ {t:B("La perte attendue d'un prêt vaut PD × LGD × ","A loan's expected loss equals PD × LGD × ")},
      {blank:[B("EAD","EAD"),B("VaR","VaR"),B("duration","duration")],correct:0},
      {t:B(". Ajouter un collatéral solide fait surtout ","Adding strong collateral mainly ")},
      {blank:[B("baisser la LGD","lowers the LGD"),B("monter la PD","raises the PD"),B("monter l'EAD","raises the EAD")],correct:0},
      {t:B(", ce qui réduit la perte. Le capital, lui, couvre surtout la perte ","which cuts the loss. Capital itself mainly covers the ")},
      {blank:[B("inattendue","unexpected"),B("attendue","expected"),B("moyenne","average")],correct:0},
      {t:B(".",".")} ]};
}
let taskState=null;
function showHeld(h,holder){ if(holder._open)closeSheet(); openSheet(h); holder._open=true; }
function runTask(task,onDone){ if(task.kind==="graph")openGraphTask(task,onDone); else openReportTask(task,onDone); }
function kindName(k){ return {line:t("Ligne","Line"),bar:t("Barres","Bars"),scatter:t("Nuage de points","Scatter")}[k]; }
function dataTableHTML(task){
  if(task.dataKind==="points"){ const lb=task.labels[LANG()]||task.labels.fr;
    return `<table class="dtable"><tr><th>Desk</th><th>${t("Risque","Risk")}</th><th>${t("Rendement","Return")}</th></tr>`+task.points.map((p,i)=>`<tr><td>${esc(lb[i])}</td><td>${p.x}</td><td>${p.y}</td></tr>`).join("")+`</table>`; }
  const lb=task.labels[LANG()]||task.labels.fr;
  return `<table class="dtable"><tr>`+lb.map(x=>`<th>${esc(x)}</th>`).join("")+`</tr><tr>`+task.values.map(v=>`<td>${v}</td>`).join("")+`</tr></table>`;
}
function openGraphTask(task,onDone){ taskState={kind:"graph",task,onDone,pickKind:null,ans:null,_open:false}; drawGraphTask(); }
function drawGraphTask(){ const ts=taskState,task=ts.task;
  let h=`<button class="x" onclick="closeTask()">✕</button><div class="kicker">📊 ${t("Demande du management","Management request")}</div>`;
  h+=`<h3 style="font-size:17px">${esc(L(task.boss))}</h3>`;
  h+=`<div class="analyst you"><b>${t("Objectif","Goal")} :</b> ${esc(L(task.objective))}</div>`;
  h+=`<div style="font-size:12px;color:var(--muted)">${t("Données fournies :","Data provided:")}</div>`+dataTableHTML(task);
  h+=`<div style="font-size:13px;color:var(--muted);margin-top:6px">${t("1) Choisis le type de graphe adapté :","1) Choose the right chart type:")}</div>`;
  const kinds=[["line",t("Ligne","Line"),"📈"],["bar",t("Barres","Bars"),"📊"],["scatter",t("Nuage","Scatter"),"🔵"]];
  h+=`<div class="kindrow">`+kinds.map(([k,lb,ic])=>`<button class="kindbtn ${ts.pickKind===k?'sel':''}" onclick="graphPickKind('${k}')">${ic}<div>${lb}</div></button>`).join("")+`</div>`;
  if(ts.pickKind){ const labels=task.labels[LANG()]||task.labels.fr;
    const vals = task.values || (task.points||[]).map(p=>p.y);
    const pts = task.points || (task.values||[]).map((v,i)=>({x:i+1,y:v}));
    const series= ts.pickKind==="scatter"?[{color:"var(--brand)",points:pts}]:[{color:"var(--brand)",values:vals}];
    h+=miniChartSVG(ts.pickKind,labels,series,null);
    h+=`<div style="font-size:13px;color:var(--muted);margin-top:4px">${t("2) Lis ton graphe :","2) Read your chart:")} <b>${esc(L(task.question))}</b></div>`;
    task.options.forEach((o,i)=>{ const cls=ts.ans==null?'':(i===task.correct?'right':(i===ts.ans?'wrong':'')); h+=`<button class="qopt ${cls}" onclick="graphAnswer(${i})"><span class="qk">${String.fromCharCode(65+i)}</span><span>${esc(L(o))}</span></button>`; }); }
  if(ts.ans!=null){ const grade=(ts.pickKind===task.correctKind?0.5:0)+(ts.ans===task.correct?0.5:0); ts.grade=grade;
    const kindOk=ts.pickKind===task.correctKind, ansOk=ts.ans===task.correct;
    h+=`<div class="qfb ${grade>=0.75?'ok':'no'}">${kindOk?t("Bon type de graphe. ","Right chart type. "):t("Le type idéal : « "+kindName(task.correctKind)+" ». ","Ideal type: '"+kindName(task.correctKind)+"'. ")}${ansOk?t("Lecture correcte ✓","Correct reading ✓"):t("Bonne réponse : "+L(task.options[task.correct]),"Right answer: "+L(task.options[task.correct]))}</div>`;
    h+=`<button class="btn sm" onclick="finishTask()">${t("Rendre le travail","Submit work")}</button>`; }
  showHeld(h,ts);
}
function graphPickKind(k){ taskState.pickKind=k; taskState.ans=null; drawGraphTask(); }
function graphAnswer(i){ if(taskState.ans!=null)return; taskState.ans=i; drawGraphTask(); }
function openReportTask(task,onDone){ taskState={kind:"report",task,onDone,answers:task.segments.map(s=>s.blank?-1:null),graded:false,_open:false}; drawReportTask(); }
function drawReportTask(){ const ts=taskState,task=ts.task;
  let h=`<button class="x" onclick="closeTask()">✕</button><div class="kicker">📝 ${t("Demande du management","Management request")}</div>`;
  h+=`<h3 style="font-size:17px">${esc(L(task.title))}</h3>`;
  h+=`<div class="analyst you"><b>${t("Brief","Brief")} :</b> ${esc(L(task.boss))}</div>`;
  h+=`<div class="clozep">`;
  task.segments.forEach((seg,si)=>{ if(seg.t){ h+=esc(L(seg.t)); }
    else { h+=`<span class="blankwrap">`+seg.blank.map((o,oi)=>{ let cls=ts.answers[si]===oi?'sel':''; if(ts.graded){ if(oi===seg.correct)cls='ok'; else if(ts.answers[si]===oi)cls='no'; } return `<button class="blankchip ${cls}" onclick="reportPick(${si},${oi})">${esc(L(o))}</button>`; }).join("")+`</span>`; } });
  h+=`</div>`;
  const allChosen=task.segments.every((s,i)=>!s.blank || ts.answers[i]!==-1);
  if(!ts.graded){ h+=`<button class="btn sm" ${allChosen?'':'disabled style=\"opacity:.5\"'} onclick="reportSubmit()">${t("Soumettre le rapport","Submit report")}</button>`; }
  else { let nb=0,ok=0; task.segments.forEach((s,i)=>{ if(s.blank){nb++; if(ts.answers[i]===s.correct)ok++;} }); ts.grade=ok/nb;
    h+=`<div class="qfb ${ts.grade>=0.9?'ok':ts.grade>=0.5?'':'no'}">${ok}/${nb} ${t("termes corrects.","terms correct.")} ${ts.grade>=0.9?t("Rapport impeccable.","Flawless report."):ts.grade<0.5?t("Plusieurs contresens — l'entreprise en pâtit.","Several errors — the firm suffers."):t("Acceptable, peut mieux faire.","Acceptable, could be better.")}</div>`;
    h+=`<button class="btn sm" onclick="finishTask()">${t("Rendre le travail","Submit work")}</button>`; }
  showHeld(h,ts);
}
function reportPick(si,oi){ if(taskState.graded)return; taskState.answers[si]=oi; drawReportTask(); }
function reportSubmit(){ const ts=taskState; if(ts.answers.some((a,i)=>ts.task.segments[i].blank&&a===-1))return; ts.graded=true; drawReportTask(); }
function finishTask(){ const g=taskState.grade||0, cb=taskState.onDone, kind=taskState.kind; taskState=null; closeSheet(); cb(g,kind); }
function closeTask(){ taskState=null; closeAllSheets(); refresh(); }
function applyTaskOutcome(grade){ const cap=Math.round(totalAssets(S)*0.004); let xp;
  if(grade>=0.9){ S.bs.cash+=cap; xp=30; toast("✓ "+t("Excellent travail","Excellent work")+" +"+money(cap)); }
  else if(grade<0.5){ S.bs.cash-=cap; xp=8; toast("⚠ "+t("Travail à revoir","Needs rework")+" −"+money(cap)); }
  else { xp=18; toast(t("Travail rendu","Work submitted")); }
  addXP(xp); if(S.today)S.today.studied++; S.counters.tasksDone=(S.counters.tasksDone||0)+1; recalc(S); }

/* ---- demandes du management (scalées par le grade) ---- */
function makeBossTask(){ return Math.random()<0.5?makeGraphTask():makeReportTask(); }
function genBossTasks(s){ s=s||S; const r=s.rankIdx; const n = r<=0?2 : r===1?1 : (r===2&&Math.random()<0.5?1:0); s.bossTasks=[]; for(let i=0;i<n;i++)s.bossTasks.push(makeBossTask()); }
function openBossTask(id){ const task=S.bossTasks.find(x=>x.id===id); if(!task)return; runTask(task,(g)=>{ applyTaskOutcome(g); S.bossTasks=S.bossTasks.filter(x=>x.id!==id); checkMissions(); checkBadges(); save(); refresh(); }); }

/* ---- examen de promotion par compétences ---- */
function pickAssessConcepts(){ const wm=weakestModules(4); let ids=CONCEPTS.filter(c=>wm.includes(c.mod)).map(c=>c.id); if(ids.length<3)ids=CONCEPTS.map(c=>c.id); return shuffle(ids).slice(0,3); }
let assessState=null;
function startPromotionAssessment(){ assessState={stages:[{type:"graph"},{type:"report"},{type:"mcq",ids:pickAssessConcepts()}],idx:0,scores:[]}; runAssessStage(); }
function runAssessStage(){ const st=assessState.stages[assessState.idx];
  if(st.type==="graph")runTask(makeGraphTask(),assessStageDone);
  else if(st.type==="report")runTask(makeReportTask(),assessStageDone);
  else openMcqStage(st.ids,assessStageDone); }
function assessStageDone(g){ assessState.scores.push(g); assessState.idx++; if(assessState.idx<assessState.stages.length)runAssessStage(); else finishAssessment(); }
function finishAssessment(){ const sc=assessState.scores, total=sc.reduce((a,b)=>a+b,0)/sc.length, pass=total>=0.7;
  const labels=[t("Produire un graphe","Build a chart"),t("Rédiger un rapport","Write a report"),t("Maîtrise des concepts","Concept mastery")];
  let h=`<button class="x" onclick="closeAssess()">✕</button><div class="kicker">🎓 ${t("Examen de promotion","Promotion assessment")}</div>`;
  h+=`<h3>${Math.round(total*100)}%</h3>`;
  h+=`<div class="dl">`+sc.map((g,i)=>`<div class="r"><span class="k">${labels[i]}</span><span class="v">${Math.round(g*100)}%</span></div>`).join("")+`</div>`;
  if(pass){ doPromote(); h+=`<p style="color:var(--good)">✓ ${t("Réussi ! Bienvenue au grade de","Passed! Welcome to")} <b>${esc(L(rankOf(S.rankIdx)))}</b>.</p>`; }
  else h+=`<p style="color:var(--warn)">${t("Il faut ≥ 70 % global. Révise tes points faibles et retente.","You need ≥ 70% overall. Review your weak spots and retry.")}</p>`;
  h+=`<button class="btn" onclick="closeAssess()">${t("Continuer","Continue")}</button>`;
  assessState=null; closeAllSheets(); openSheet(h); save(); refresh();
}
function closeAssess(){ assessState=null; closeAllSheets(); refresh(); }
let mcqStage=null;
function openMcqStage(ids,onDone){ mcqStage={ids,idx:0,score:0,onDone,order:null,answered:false,_open:false}; drawMcq(); }
function drawMcq(){ const ms=mcqStage, c=conceptById(ms.ids[ms.idx]); if(!ms.order)ms.order=shuffle(c.quiz.opts.map((o,i)=>({o,i})));
  let h=`<button class="x" onclick="closeMcq()">✕</button><div class="kicker">${t("Examen — concepts","Assessment — concepts")} ${ms.idx+1}/${ms.ids.length}</div>`;
  h+=`<h3 style="font-size:17px">${esc(L(c.quiz.q))}</h3>`;
  ms.order.forEach((it,k)=>{ let cls=''; if(ms.answered){ if(it.i===c.quiz.correct)cls='right'; else if(k===ms.pick)cls='wrong'; } h+=`<button class="qopt ${cls}" onclick="mcqAnswer(${k})"><span class="qk">${String.fromCharCode(65+k)}</span><span>${esc(L(it.o))}</span></button>`; });
  if(ms.answered){ h+=`<div class="qfb ${ms.lastOk?'ok':'no'}">${esc(L(c.quiz.exp))}</div><button class="btn sm" onclick="mcqNext()">${ms.idx>=ms.ids.length-1?t("Terminer","Finish"):t("Suivant","Next")}</button>`; }
  showHeld(h,ms);
}
function mcqAnswer(k){ const ms=mcqStage; if(ms.answered)return; ms.answered=true; ms.pick=k; const c=conceptById(ms.ids[ms.idx]); const ok=ms.order[k].i===c.quiz.correct; ms.lastOk=ok; if(ok)ms.score++; srsReview(c.id,ok?5:2); learnConcept(c.id); drawMcq(); }
function mcqNext(){ const ms=mcqStage; ms.idx++; ms.answered=false; ms.order=null; if(ms.idx>=ms.ids.length){ const g=ms.score/ms.ids.length, cb=ms.onDone; mcqStage=null; closeSheet(); cb(g); } else drawMcq(); }
function closeMcq(){ mcqStage=null; closeAllSheets(); refresh(); }

function firmUnlocked(){ return S.rankIdx>=5; }
let allocTmp=null, firmHolder={_open:false};
const ALLOC_KEYS=[["cash","var(--faint)",{fr:"Cash",en:"Cash"}],["hqla","var(--liq)",{fr:"HQLA",en:"HQLA"}],["loansCorp","var(--credit)",{fr:"Prêts corp",en:"Corp loans"}],["loansRetail","var(--gold)",{fr:"Prêts retail",en:"Retail loans"}],["securities","var(--market)",{fr:"Titres",en:"Securities"}],["deriv","var(--brand)",{fr:"Dérivés",en:"Derivatives"}]];
function openFirm(){ const TA=totalAssets(S); allocTmp={}; ALLOC_KEYS.forEach(([k])=>allocTmp[k]=S.bs[k]/TA); firmHolder={_open:false}; drawFirm(); }
function allocPreview(){ const clone=JSON.parse(JSON.stringify(S)); const TA=totalAssets(S); let sum=0; for(const k in allocTmp)sum+=allocTmp[k]; if(sum<=0)sum=1; ALLOC_KEYS.forEach(([k])=>clone.bs[k]=allocTmp[k]/sum*TA); recalc(clone); return clone.metrics; }
function drawFirm(){ let sum=0; for(const k in allocTmp)sum+=allocTmp[k]; const m=allocPreview();

  ALLOC_KEYS.forEach(([k,c,nm])=>{ const pct=Math.round(allocTmp[k]/(sum||1)*100); h+=`<div class="allocrow"><span class="al"><i style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${c};margin-right:5px"></i>${esc(L(nm))}</span><input type="range" min="0" max="60" value="${Math.round(allocTmp[k]*100)}" oninput="setAlloc('${k}',this.value)"><span class="av">${pct}%</span></div>`; });
  h+=`<div class="allocsum">${t("Normalisé à 100 %","Normalised to 100%")} · ${t("Aperçu","Preview")} → CET1 ${(m.cet1*100).toFixed(1)}% · VaR ${money(m.var99)} · LCR ${(m.lcr*100).toFixed(0)}%</div>`;
  h+=`<div class="pill-row" style="margin-top:10px"><button class="dpill" onclick="allocPreset('cons')">🌿 ${t("Conservateur","Conservative")}</button><button class="dpill" onclick="allocPreset('bal')">⚖️ ${t("Équilibré","Balanced")}</button><button class="dpill" onclick="allocPreset('agg')">🔥 ${t("Agressif","Aggressive")}</button></div>`;
  h+=`<div class="btnrow"><button class="btn sec sm" onclick="closeSheet()">${t("Annuler","Cancel")}</button><button class="btn sm" onclick="applyAlloc()">${t("Appliquer","Apply")}</button></div>`;
  showHeld(h,firmHolder);
}
function setAlloc(k,v){ allocTmp[k]=Math.max(0,+v/100); drawFirm(); }
function allocPreset(p){ const P={cons:{cash:0.06,hqla:0.30,loansCorp:0.18,loansRetail:0.20,securities:0.18,deriv:0.08},bal:{cash:0.05,hqla:0.20,loansCorp:0.25,loansRetail:0.20,securities:0.20,deriv:0.10},agg:{cash:0.03,hqla:0.10,loansCorp:0.27,loansRetail:0.15,securities:0.30,deriv:0.15}}[p]; allocTmp=Object.assign({},P); drawFirm(); }
function applyAlloc(){ const TA=totalAssets(S); let sum=0; for(const k in allocTmp)sum+=allocTmp[k]; if(sum<=0){toast(t("Allocation invalide","Invalid allocation"));return;} ALLOC_KEYS.forEach(([k])=>S.bs[k]=allocTmp[k]/sum*TA); recalc(S); save(); checkBadges(); toast(t("Portefeuille réalloué","Portfolio reallocated")); closeSheet(); refresh(); }
/* === fin moteur v3 === */
boot();
</script>
