<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>Risk Manager Tycoon — Prépa FRM</title>
<style>
:root{
  --bg:#0e1217; --panel:#161b22; --panel2:#1c232d; --line:#283039;
  --txt:#e8edf2; --muted:#8a96a4; --faint:#5a6573;
  --brand:#5b8def; --brand-d:#3d6bd6;
  --good:#3fb98a; --warn:#e0a23b; --crit:#e5604d; --gold:#caa45a; --purple:#b07be0;
  --credit:#e0a23b; --market:#5b8def; --op:#b07be0; --liq:#3fb98a; --cp:#e5604d; --quant:#56c2c8; --found:#caa45a;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:14px; --rs:10px;
}
[data-theme="light"]{--bg:#eef1f5;--panel:#fff;--panel2:#f3f5f9;--line:#dde2ea;--txt:#15202b;--muted:#5a6573;--faint:#9aa5b1;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
.mono{font-family:var(--mono)}
button{font-family:inherit;font-size:16px;cursor:pointer;border:none;color:inherit}
.app{max-width:520px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;padding-bottom:env(safe-area-inset-bottom)}
.pad{padding:16px}
.topbar{position:sticky;top:0;z-index:30;background:rgba(14,18,23,.86);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--line);padding:max(10px,env(safe-area-inset-top)) 14px 10px;display:flex;align-items:center;gap:10px}
[data-theme="light"] .topbar{background:rgba(238,241,245,.9)}
.topbar .bank{font-weight:700;font-size:15px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .day{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
.iconbtn{width:40px;height:40px;border-radius:10px;background:var(--panel2);display:grid;place-items:center;font-size:18px;border:1px solid var(--line)}
.lvlpill{font-family:var(--mono);font-size:11px;background:var(--panel2);border:1px solid var(--line);padding:3px 8px;border-radius:999px;color:var(--gold);white-space:nowrap}
.xpwrap{padding:8px 14px 0}
.xpbar{height:6px;background:var(--panel2);border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.xpfill{height:100%;background:linear-gradient(90deg,var(--gold),#e7c987);width:0%;transition:width .5s}
.xpmeta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:5px}
.section{margin:16px 14px 0}
.section h2{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:0 0 10px;font-weight:700}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--rs);padding:11px 12px}
.stat .lab{font-size:11px;color:var(--muted)}
.stat .val{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:3px}
.stat .sub{font-family:var(--mono);font-size:11px;margin-top:2px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric{background:var(--panel);border:1px solid var(--line);border-radius:var(--rs);padding:11px;position:relative;overflow:hidden;cursor:pointer}
.metric::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--line)}
.metric.g::before{background:var(--good)}.metric.w::before{background:var(--warn)}.metric.c::before{background:var(--crit)}
.metric .name{font-size:11px;color:var(--muted)}
.metric .num{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:2px}
.metric .trend{font-family:var(--mono);font-size:11px;margin-top:3px;color:var(--muted)}
.metric .learn{position:absolute;right:8px;top:8px;font-size:11px;color:var(--faint)}
.prow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:none}
.prow .nm{font-size:14px}.prow .nm small{display:block;color:var(--muted);font-size:11px}
.prow .amt{font-family:var(--mono);text-align:right}.prow .amt small{display:block;font-size:11px;color:var(--muted)}
.evt{display:flex;gap:10px;align-items:flex-start;padding:11px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);margin-bottom:9px}
.evt .dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:none}
.evt .body{flex:1;min-width:0}
.evt .ti{font-size:14px;font-weight:600}
.evt .tag{font-size:11px;color:var(--muted)}
.evt .go{font-family:var(--mono);font-size:18px;color:var(--faint)}
.mission{display:flex;gap:10px;align-items:center;padding:10px 11px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);margin-bottom:9px}
.mission.done{opacity:.6}
.mcheck{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:13px}
.mission.done .mcheck{background:var(--good);border-color:var(--good);color:#0e1217}
.mission .mt{flex:1;font-size:14px}.mission .mr{font-family:var(--mono);font-size:11px;color:var(--gold)}
.btn{display:block;width:100%;padding:14px;border-radius:12px;background:var(--brand);color:#fff;font-weight:700;text-align:center;border:1px solid var(--brand-d);font-size:16px}
.btn:active{transform:translateY(1px)}
.btn.sec{background:var(--panel2);color:var(--txt);border-color:var(--line)}
.btn.ghost{background:transparent;border-color:var(--line)}
.btn.good{background:var(--good);border-color:#2e9b72}
.btn.warn{background:var(--warn);border-color:#c98c2b;color:#1a1206}
.btn.crit{background:var(--crit);border-color:#c84b3a}
.btn.sm{padding:11px;font-size:14px}
.btnrow{display:flex;gap:10px;margin-top:14px}.btnrow .btn{margin:0}
.bignav{position:sticky;bottom:0;background:linear-gradient(0deg,var(--bg) 60%,transparent);padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom))}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.badge-line{display:flex;align-items:center;gap:11px;padding:10px;border:1px solid var(--line);border-radius:var(--rs);margin-bottom:9px;background:var(--panel)}
.badge-line.locked{opacity:.45}
.badge-ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:20px;background:var(--panel2);border:1px solid var(--line)}
.badge-line.earned .badge-ic{background:linear-gradient(135deg,var(--gold),#8c6f33);border-color:var(--gold)}
.badge-line .bn{font-weight:600;font-size:14px}.badge-line .bd{font-size:12px;color:var(--muted)}
.modbtn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);margin-bottom:9px}
.modbtn .mic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex:none}
.modbtn .mtit{font-weight:600;font-size:15px;flex:1}.modbtn .mtit small{display:block;color:var(--muted);font-weight:400;font-size:12px}
.modbtn .arr{font-family:var(--mono);color:var(--faint)}
.concept-item{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);margin-bottom:8px}
.concept-item .ci-name{flex:1;font-size:14px}
.concept-item .ci-name small{display:block;color:var(--muted);font-size:11px}
.learned-tick{color:var(--good);font-size:14px}
.scrim{position:fixed;inset:0;background:rgba(4,7,11,.66);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--panel);width:100%;max-width:520px;max-height:92vh;max-height:92dvh;overflow:auto;border-radius:18px 18px 0 0;border:1px solid var(--line);border-bottom:none;padding:18px 16px max(20px,env(safe-area-inset-bottom));animation:up .25s ease}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
.sheet .x{float:right;width:34px;height:34px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);font-size:16px;color:var(--muted)}
.sheet h3{margin:2px 0 4px;font-size:19px;line-height:1.25;padding-right:40px}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
.rule{height:1px;background:var(--line);margin:14px 0}
.cblock{margin:13px 0}
.cblock .h{font-size:12px;font-weight:700;letter-spacing:.05em;color:var(--brand);margin-bottom:4px;display:flex;gap:6px;align-items:center}
.cblock.why .h{color:var(--gold)}.cblock.hist .h{color:var(--purple)}.cblock.lim .h{color:var(--crit)}.cblock.game .h{color:var(--good)}
.cblock p{margin:0;color:var(--txt);font-size:14.5px;line-height:1.5}
.formula{font-family:var(--mono);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:13.5px;margin-top:8px;overflow-x:auto}
.dl{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:4px 12px;margin:10px 0}
.dl .r{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px;gap:10px}
.dl .r:last-child{border-bottom:none}
.dl .r .k{color:var(--muted)}.dl .r .v{font-family:var(--mono);text-align:right}
.choice{width:100%;text-align:left;padding:13px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);margin-bottom:9px}
.choice.active{border-color:var(--brand);background:rgba(91,141,239,.12)}
.choice .cl{font-weight:600;font-size:14.5px}
.choice .cp{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5}
.qopt{width:100%;text-align:left;padding:12px;border:1px solid var(--line);border-radius:11px;background:var(--panel2);margin-bottom:8px;font-size:14.5px;display:flex;gap:10px;align-items:center}
.qopt .qk{font-family:var(--mono);width:22px;height:22px;border-radius:6px;background:var(--panel);border:1px solid var(--line);display:grid;place-items:center;font-size:12px;flex:none}
.qopt.right{border-color:var(--good);background:rgba(63,185,138,.14)}.qopt.right .qk{background:var(--good);color:#0e1217;border-color:var(--good)}
.qopt.wrong{border-color:var(--crit);background:rgba(229,96,77,.14)}.qopt.wrong .qk{background:var(--crit);border-color:var(--crit)}
.qfb{border-radius:11px;padding:12px;margin-top:6px;font-size:14px;border:1px solid var(--line);background:var(--panel2)}
.qfb.ok{border-color:var(--good)}.qfb.no{border-color:var(--crit)}
.delta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:13.5px;padding:6px 0;border-bottom:1px solid var(--line)}
.delta:last-child{border-bottom:none}
.up{color:var(--good)}.down{color:var(--crit)}.neu{color:var(--muted)}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(20px + env(safe-area-inset-bottom));background:var(--panel2);border:1px solid var(--gold);color:var(--txt);padding:11px 16px;border-radius:12px;z-index:200;font-size:14px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:90%;text-align:center;animation:tin .3s}
@keyframes tin{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
.home-hero{padding:46px 22px 22px;text-align:center}
.home-hero .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
.home-hero h1{font-size:38px;line-height:1.02;margin:12px 0 6px;letter-spacing:-.02em;font-weight:800}
.home-hero h1 span{color:var(--brand)}
.home-hero p{color:var(--muted);font-size:14.5px;margin:0 auto;max-width:330px}
.profrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:18px 0 8px}
.profchip{font-family:var(--mono);font-size:12px;background:var(--panel);border:1px solid var(--line);padding:8px 12px;border-radius:999px}
.profchip b{color:var(--gold)}
.menu-list{padding:6px 14px 30px}
.menu-list .btn{margin-bottom:11px}
.tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:13px}
.tbl th,.tbl td{text-align:right;padding:9px 6px;border-bottom:1px solid var(--line)}
.tbl th:first-child,.tbl td:first-child{text-align:left;color:var(--muted)}
.tbl th{color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase}
.crisis-banner{background:linear-gradient(135deg,rgba(229,96,77,.18),rgba(229,96,77,.05));border:1px solid var(--crit);border-radius:var(--r);padding:14px;margin:16px 14px 0}
.crisis-banner .ct{font-weight:800;font-size:16px;color:var(--crit)}
.hint{font-size:12px;color:var(--faint);text-align:center;margin-top:14px;padding:0 10px;line-height:1.5}
.spacer{height:8px}.center{text-align:center}
.searchbox{width:100%;padding:12px 14px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:15px;margin-bottom:12px}
.searchbox::placeholder{color:var(--faint)}
.calc-field{margin:10px 0}
.calc-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.calc-field input,.calc-field select{width:100%;padding:11px 12px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:15px}
.calc-out{background:var(--panel2);border:1px solid var(--brand);border-radius:11px;padding:13px;margin-top:12px;text-align:center}
.calc-out .co-v{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--brand)}
.calc-out .co-l{font-size:12px;color:var(--muted);margin-top:3px}
.toolgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tool{padding:14px 12px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);text-align:center}
.tool .ti2{font-size:24px}.tool .tn{font-size:13px;font-weight:600;margin-top:6px}.tool .td{font-size:11px;color:var(--muted);margin-top:2px}
.exam-prog{height:8px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:6px 0 14px}
.exam-prog div{height:100%;background:var(--brand)}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.dpill{font-family:var(--mono);font-size:12px;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--panel2)}
.dpill.on{border-color:var(--brand);background:rgba(91,141,239,.15);color:var(--brand)}
.spark{display:block;width:100%;height:48px}
.sparkcard{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);margin-bottom:9px}
.sparkcard .sl{flex:none;width:96px}.sparkcard .sl .k{font-size:11px;color:var(--muted)}.sparkcard .sl .v{font-family:var(--mono);font-size:16px;font-weight:600}
.sparkcard .sg{flex:1}
.rankhdr{margin:16px 14px 0;background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:13px}
.rankhdr .rk-ic{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#8c6f33);display:grid;place-items:center;font-size:22px;flex:none}
.rankhdr .rk-t{flex:1}.rankhdr .rk-t .rk-r{font-weight:700;font-size:16px}.rankhdr .rk-t .rk-s{font-size:12px;color:var(--muted)}
.survival{background:linear-gradient(135deg,rgba(224,162,59,.16),rgba(229,96,77,.08));border:1px solid var(--warn);border-radius:var(--r);padding:13px;margin:16px 14px 0}
.survival .sv-t{font-weight:800;color:var(--warn)}
.bsbar{display:flex;height:30px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin:8px 0}
.bsbar span{display:block;height:100%}
.bschip{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-right:12px;margin-top:6px}
.bschip i{width:10px;height:10px;border-radius:3px;display:inline-block}
.hedge{display:flex;align-items:center;gap:10px;padding:10px 11px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);margin-bottom:8px}
.hedge .hg-t{flex:1;font-size:13.5px}.hedge .hg-t small{display:block;color:var(--muted);font-size:11px;font-family:var(--mono)}
.sliderwrap{margin:14px 0}
.sliderwrap label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px}
.sliderwrap label b{font-family:var(--mono);color:var(--txt)}
input[type=range]{width:100%;accent-color:var(--brand)}
.langflag{font-family:var(--mono);font-size:12px;padding:4px 9px;border-radius:8px;border:1px solid var(--line);background:var(--panel2)}
.partpill{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.stars{font-family:var(--sans);font-size:19px;letter-spacing:2px}
.stars .on{color:var(--gold)}.stars .off{color:var(--faint)}
.dtable{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;margin:8px 0}
.dtable th,.dtable td{border:1px solid var(--line);padding:5px 7px;text-align:right}.dtable th{color:var(--muted);font-weight:600}
.dtable td:first-child,.dtable th:first-child{text-align:left}
.analyst{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:8px;padding:9px 11px;font-size:13px;margin:10px 0;line-height:1.5}
.analyst b{color:var(--brand)}
.analyst.you{border-left-color:var(--gold)}.analyst.you b{color:var(--gold)}
.kindrow{display:flex;gap:8px;margin:6px 0}
.kindbtn{flex:1;padding:12px 6px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);text-align:center;font-size:13px}
.kindbtn.sel{border-color:var(--brand);background:rgba(91,141,239,.15);color:var(--brand)}
.clozep{font-size:15px;line-height:2.1}
.blankwrap{display:inline-flex;flex-wrap:wrap;gap:4px;vertical-align:middle;padding:0 2px}
.blankchip{font-size:12px;padding:3px 9px;border-radius:8px;border:1px dashed var(--line);background:var(--panel2);color:var(--muted)}
.blankchip.sel{border-style:solid;border-color:var(--brand);background:rgba(91,141,239,.15);color:var(--brand)}
.blankchip.ok{border-color:var(--good);background:rgba(63,185,138,.15);color:var(--good)}
.blankchip.no{border-color:var(--crit);background:rgba(229,96,77,.15);color:var(--crit)}
.taskcard{display:flex;gap:10px;align-items:center;padding:11px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);margin-bottom:9px;border-left:3px solid var(--gold)}
.taskcard .tk-ic{font-size:20px}.taskcard .tk-b{flex:1}.taskcard .tk-t{font-size:14px;font-weight:600}.taskcard .tk-s{font-size:11px;color:var(--muted)}
.allocrow{display:flex;align-items:center;gap:10px;margin:9px 0}
.allocrow .al{flex:none;width:96px;font-size:12px;color:var(--muted)}
.allocrow input{flex:1}
.allocrow .av{font-family:var(--mono);width:46px;text-align:right;font-size:12px}
.allocsum{font-family:var(--mono);text-align:center;font-size:12px;margin-top:6px}
.miniaxis{font-family:var(--mono);font-size:8px;fill:var(--faint)}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
"use strict";
/* ===================================================================
   RISK MANAGER TYCOON v2 — moteur FRM bilingue, bilan couplé, carrière,
   répétition espacée adaptative, hedging jouable, visualisations. PWA.
   =================================================================== */
/* ---------- utils ---------- */
const $=(id)=>document.getElementById(id);
let app=null;
const rnd=(a,b)=>Math.random()*(b-a)+a;
const ri=(a,b)=>Math.floor(rnd(a,b+1));

function totalAssets(s){const a=s.bs;return a.cash+a.hqla+a.loansCorp+a.loansRetail+a.securities+a.deriv;}
function totalLiab(s){const a=s.bs;return a.deposits+a.wholesale+a.repo;}
function equity(s){return totalAssets(s)-totalLiab(s);}
function riskyBook(s){return s.bs.securities+s.bs.deriv;}

function recalc(s){
  const a=s.bs, TA=totalAssets(s), eq=equity(s);
  s.metrics.capital=eq;
  // RWA
  const rwa = a.loansCorp*1.0 + a.loansRetail*0.6 + a.securities*0.8 + a.deriv*1.2;
  s.metrics.cet1 = clamp(eq/Math.max(rwa,1),0,1);
  s.metrics.leverage = clamp(eq/Math.max(TA,1),0,1);
  // VaR de marché (securities + deriv) avec vol pondérée et corrélation
  const volS=0.012, volD=0.03, wS=a.securities, wD=a.deriv;
  const baseVol = Math.sqrt(wS*wS*volS*volS + wD*wD*volD*volD + 2*s.rho*wS*wD*volS*volD)/Math.max(wS+wD,1);
  let gross = (wS+wD)*baseVol*Z["99"];
  // les hedges réduisent la VaR selon leur couverture effective
  let cover=0; for(const h of s.hedges) cover += h.notional*h.eff*(1-h.drift);
  s.metrics.var99 = Math.max(Math.round(gross*0.12), Math.round(gross - cover*0.5)); // résiduel: jamais 100% couvert
  s.metrics.es = Math.round(s.metrics.var99*1.18); // ES99 ≈ 1.18×VaR99 (normal)
  // liquidité : LCR & NSFR
  const outflows = a.deposits*0.10 + a.wholesale*0.5 + a.repo*0.25;
  s.metrics.lcr = clamp(a.hqla/Math.max(outflows,1),0,3);
  const asf = eq*1.0 + a.deposits*0.9 + a.wholesale*0.5;
  const rsf = a.loansCorp*0.85 + a.loansRetail*0.65 + a.securities*0.5 + a.hqla*0.05 + a.deriv*0.7;
  s.metrics.nsfr = clamp(asf/Math.max(rsf,1),0,3);
  s.metrics.creditRisk = clamp(s.bookPD*(0.6+ s.bookLGD/100*0.9),0.1,40);
  s.metrics.opRisk=clamp(s.metrics.opRisk,0.1,30);
  s.metrics.counterparty=clamp(s.metrics.counterparty,0.1,40);
  // compliance globale
  s.metrics.compliance = (s.metrics.cet1>=0.105 && s.metrics.lcr>=1 && s.metrics.nsfr>=1 && s.metrics.leverage>=0.03)
     ? "BASEL III ✓" : (s.metrics.cet1>=0.08 ? "BASEL II ~" : "NON CONFORME ✕");
}
function liqScore(s){ return clamp(Math.round(s.metrics.lcr*70),0,100); } // 0-100 dérivé du LCR
function snapshot(s){return {day:s.day,capital:s.metrics.capital,var99:s.metrics.var99,es:s.metrics.es,creditRisk:s.metrics.creditRisk,opRisk:s.metrics.opRisk,counterparty:s.metrics.counterparty,lcr:s.metrics.lcr,nsfr:s.metrics.nsfr,liq:liqScore(s)};}

/* ---------- contagion : un choc corrélé se propage entre lignes ---------- */
function applyShock(s, mag, rho){
  s.rho = clamp(rho, s.rho, 0.92);          // les corrélations montent en crise
  s.bs.securities *= (1 - mag*0.9);
  s.bs.deriv     *= (1 - mag*0.6);
  s.bs.loansCorp *= (1 - mag*0.12*rho);      // contagion crédit ∝ corrélation
  s.bookPD       *= (1 + mag*2.2*rho);
  s.metrics.counterparty *= (1 + mag*2*rho);
  s.bs.deposits  *= (1 - mag*0.25*rho);      // fuite des dépôts (liquidité)
  s.bs.hqla      *= (1 - mag*0.15);
  recalc(s);
}

{id:"var_param",mod:"market",part:1,lvl:1,

 pourquoi:B("La VaR donne UN chiffre comparable pour le risque de marché, langue commune entre desks, dirigeants et régulateurs.","VaR gives ONE comparable number for market risk, a common language for desks, management and regulators."),

 histoire:B("Reconnu par Bâle II comme catégorie de capital.","Recognised by Basel II as a capital category."),
 comment:B("Piloté par contrôles, KRI, collecte de pertes, scénarios.","Managed via controls, KRIs, loss collection, scenarios."),
 exemple:B("Une cyberattaque à 80 M€ : pure perte opérationnelle.","An €80M cyberattack: pure operational loss."),
 limites:B("Données rares et extrêmes, dures à modéliser.","Rare, extreme data, hard to model."),
 quiz:{q:B("Une erreur de saisie coûteuse est un risque…","A costly data-entry error is which risk?"),opts:[B("de marché","market"),B("opérationnel","operational"),B("de liquidité","liquidity"),B("de crédit","credit")],correct:1,exp:B("Défaillance de processus = opérationnel.","Process failure = operational.")}},
{id:"rcsa",mod:"op",part:2,lvl:2,name:B("RCSA","RCSA"),
 quoi:B("Démarche où chaque équipe identifie ses risques opérationnels et évalue ses contrôles.","Process where each team identifies its operational risks and rates its controls."),
 pourquoi:B("Le risque se voit mieux du terrain que d'une tour d'ivoire.","Risk is seen better from the floor than from an ivory tower."),
 histoire:B("Pratique standard des dispositifs op risk modernes.","Standard practice in modern op-risk frameworks."),
 comment:B("Ateliers notant probabilité × impact et la solidité du contrôle.","Workshops scoring likelihood × impact and control strength."),
 exemple:B("« Erreur de saisie » : probable, impact moyen, contrôle faible → action.","'Data-entry error': likely, medium impact, weak control → action."),
 limites:B("Subjectif : risque de complaisance.","Subjective: risk of complacency."),
 quiz:{q:B("Le RCSA repose sur…","RCSA relies on…"),opts:[B("Monte Carlo","Monte Carlo"),B("l'auto-évaluation des équipes","team self-assessment"),B("les prix de marché","market prices"),B("les notes externes","external ratings")],correct:1,exp:B("Auto-évaluation des risques et contrôles.","Self-assessment of risks and controls.")}},
{id:"kri",mod:"op",part:2,lvl:2,name:B("Key Risk Indicators (KRI)","Key Risk Indicators (KRI)"),
 quoi:B("Indicateurs avancés signalant une montée du risque AVANT la perte.","Leading indicators flagging rising risk BEFORE a loss."),
 pourquoi:B("Mieux vaut un signal d'alerte qu'un constat de dégâts.","Better an early warning than a damage report."),
 histoire:B("Empruntés au pilotage industriel.","Borrowed from industrial monitoring."),
 comment:B("Ex. taux d'erreur, turnover clé, tentatives d'intrusion, avec seuils.","E.g. error rate, key-staff turnover, intrusion attempts, with thresholds."),
 exemple:B("Échec de règlement 0,5 %→3 % : KRI rouge, on enquête.","Settlement fails 0.5%→3%: red KRI, investigate."),
 limites:B("Un mauvais KRI donne un faux sentiment de sécurité.","A bad KRI gives false security."),
 quiz:{q:B("Un bon KRI doit être…","A good KRI must be…"),opts:[B("rétrospectif","backward-looking"),B("prédictif / avancé","predictive / leading"),B("comptable","accounting"),B("confidentiel","confidential")],correct:1,exp:B("Il alerte en amont de la perte.","It warns ahead of the loss.")}},
{id:"evt",mod:"op",part:2,lvl:4,name:B("Théorie des valeurs extrêmes (EVT)","Extreme Value Theory (EVT)"),
 quoi:B("Statistique modélisant spécifiquement les événements rares et extrêmes (les queues).","Statistics specifically modelling rare, extreme events (the tails)."),
 pourquoi:B("Le risque op et les krachs vivent dans la queue ; la loi normale les sous-estime massivement.","Op risk and crashes live in the tail; the normal distribution massively underestimates them."),
 histoire:B("Issue de l'hydrologie (crues centennales).","Born in hydrology (100-year floods)."),
 comment:B("On ajuste une loi GPD aux dépassements d'un seuil élevé.","Fit a GPD to exceedances above a high threshold."),
 exemple:B("Estimer la perte « une fois par millénaire » sans 1000 ans de données.","Estimate a 'once-per-millennium' loss without 1000 years of data."),
 limites:B("Très sensible au seuil et au peu de données.","Very sensitive to threshold and scarce data."),
 quiz:{q:B("L'EVT modélise…","EVT models…"),opts:[B("la moyenne","the mean"),B("les extrêmes en queue","tail extremes"),B("le change quotidien","daily FX"),B("les dividendes","dividends")],correct:1,exp:B("Son objet est la queue de distribution.","Its object is the distribution's tail.")}},
{id:"ama",mod:"op",part:2,lvl:3,name:B("Approches de capital op (BIA/SA/AMA)","Op capital approaches (BIA/SA/AMA)"),
 quoi:B("Méthodes Bâle pour calculer le capital opérationnel, de la plus simple (indicateur de base) à la plus avancée (modèles internes).","Basel methods to compute operational capital, from simplest (basic indicator) to most advanced (internal models)."),
 pourquoi:B("Plus l'approche est sophistiquée, plus elle reflète le vrai profil de risque — mais plus elle est exigeante.","The more sophisticated the approach, the better it reflects the true risk profile — but the more demanding."),
 histoire:B("Bâle III a remplacé l'AMA par une approche standardisée unique (SMA) pour réduire la variabilité.","Basel III replaced AMA with a single standardised approach (SMA) to cut variability."),
 comment:B("Le capital dépend d'un indicateur d'activité et de l'historique de pertes.","Capital depends on a business indicator and loss history."),
 exemple:B("Une banque avec de lourdes pertes passées porte plus de capital op.","A bank with heavy past losses carries more op capital."),
 limites:B("Les modèles internes (AMA) variaient trop d'une banque à l'autre.","Internal models (AMA) varied too much across banks."),
 quiz:{q:B("Bâle III a remplacé l'AMA par…","Basel III replaced AMA with…"),opts:[B("rien","nothing"),B("une approche standardisée unique","a single standardised approach"),B("la VaR","VaR"),B("le CAPM","CAPM")],correct:1,exp:B("Pour réduire la variabilité, une approche standardisée a été imposée.","To cut variability, a standardised approach was imposed.")}},

/* ---- LIQUIDITY ---- */
{id:"liqrisk",mod:"liquidity",part:1,lvl:1,name:B("Risque de liquidité","Liquidity risk"),
 quoi:B("Ne pas pouvoir payer à temps (financement) ou devoir brader un actif faute d'acheteurs (marché).","Inability to pay on time (funding) or having to dump an asset for lack of buyers (market)."),
 pourquoi:B("Une banque solvable peut mourir de liquidité : si tous retirent en même temps, c'est le bank run.","A solvent bank can die of illiquidity: if everyone withdraws at once, it's a bank run."),
 histoire:B("2008 (Northern Rock, Lehman) → Bâle III crée LCR et NSFR.","2008 (Northern Rock, Lehman) → Basel III created LCR and NSFR."),
 comment:B("On distingue liquidité d'actif et de financement.","Distinguish asset liquidity from funding liquidity."),
 exemple:B("Actifs à 10 ans, dépôts retirables demain : mismatch.","10-year assets, deposits withdrawable tomorrow: mismatch."),
 limites:B("Abondante en temps calme, nulle en panique.","Plentiful when calm, gone in panic."),
 quiz:{q:B("Une banque solvable peut-elle tomber par illiquidité ?","Can a solvent bank fail from illiquidity?"),opts:[B("non","no"),B("oui, si elle ne paie pas à temps","yes, if it can't pay on time"),B("seulement si insolvable","only if insolvent"),B("seulement sur fraude","only on fraud")],correct:1,exp:B("L'illiquidité tue même une banque saine (bank run).","Illiquidity kills even a sound bank (bank run).")}},
{id:"lcr",mod:"liquidity",part:2,lvl:3,name:B("Liquidity Coverage Ratio (LCR)","Liquidity Coverage Ratio (LCR)"),
 quoi:B("Détenir assez d'actifs liquides (HQLA) pour survivre à 30 jours de stress. LCR ≥ 100 %.","Hold enough high-quality liquid assets (HQLA) to survive 30 days of stress. LCR ≥ 100%."),
 pourquoi:B("Réponse directe à 2008 : un coussin survivable un mois, le temps d'organiser une réponse.","Direct answer to 2008: a buffer to survive a month, time to organise a response."),
 histoire:B("Introduit par Bâle III (2013).","Introduced by Basel III (2013)."),
 comment:B("LCR = HQLA / sorties nettes sur 30 jours stressés.","LCR = HQLA / net outflows over 30 stressed days."),
 exemple:B("HQLA 120, sorties 100 → LCR 120 %.","HQLA 120, outflows 100 → LCR 120%."),
 limites:B("Horizon 30 jours seulement ; taux de fuite calibrés.","30-day horizon only; calibrated runoff rates."),
 quiz:{q:B("Le LCR couvre un stress de…","LCR covers a stress of…"),opts:[B("1 jour","1 day"),B("30 jours","30 days"),B("1 an","1 year"),B("10 ans","10 years")],correct:1,exp:B("Survie de 30 jours de sorties stressées.","Survival of 30 days of stressed outflows.")}},
{id:"nsfr",mod:"liquidity",part:2,lvl:3,name:B("Net Stable Funding Ratio (NSFR)","Net Stable Funding Ratio (NSFR)"),
 quoi:B("Sur 1 an : le financement stable doit couvrir les besoins de financement stable des actifs. NSFR ≥ 100 %.","Over 1 year: stable funding must cover assets' stable funding needs. NSFR ≥ 100%."),
 pourquoi:B("Empêche de financer des actifs longs avec de la dette ultra-courte — le péché qui coule les banques.","Stops funding long assets with ultra-short debt — the sin that sinks banks."),
 histoire:B("Complément structurel du LCR (Bâle III).","Structural complement to the LCR (Basel III)."),
 comment:B("NSFR = financement stable disponible / requis, sur 1 an.","NSFR = available / required stable funding, over 1 year."),
 exemple:B("Financer du 10 ans avec du repo overnight → NSFR catastrophique.","Funding 10-year assets with overnight repo → terrible NSFR."),
 limites:B("Peut pénaliser une transformation d'échéances utile.","Can penalise useful maturity transformation."),
 quiz:{q:B("Le NSFR évite surtout…","NSFR mainly prevents…"),opts:[B("le risque de change","FX risk"),B("financer du long avec du très court","funding long with very short"),B("la fraude","fraud"),B("la concentration","concentration")],correct:1,exp:B("Il impose un financement stable adapté à la maturité.","It enforces stable funding matched to maturity.")}},
{id:"haircut",mod:"liquidity",part:2,lvl:2,name:B("Haircut (décote de collatéral)","Haircut (collateral)"),
 quoi:B("Décote sur un actif donné en garantie : on ne prête pas 100 % de sa valeur.","Discount on collateral pledged: you don't lend 100% of its value."),
 pourquoi:B("Le prêteur se protège d'une baisse du collatéral ; plus l'actif est volatil, plus le haircut est gros.","The lender guards against a fall in collateral; the more volatile the asset, the bigger the haircut."),
 histoire:B("Les hausses de haircuts en 2008 ont asséché le repo.","Rising haircuts in 2008 drained the repo market."),
 comment:B("Montant prêté = valeur × (1 − haircut).","Lent amount = value × (1 − haircut)."),
 exemple:B("100 M€, haircut 8 % → on emprunte 92 M€.","€100M, haircut 8% → borrow €92M."),
 limites:B("Les haircuts montent en crise (procyclicité).","Haircuts rise in crises (procyclicality)."),
 quiz:{q:B("En stress, les haircuts…","Under stress, haircuts…"),opts:[B("baissent","fall"),B("fixes","stay fixed"),B("augmentent","rise"),B("disparaissent","vanish")],correct:2,exp:B("Ils montent et réduisent le financement (procyclicité).","They rise and cut funding (procyclicality).")}},
{id:"funding_liq",mod:"liquidity",part:2,lvl:3,name:B("Spirale d'illiquidité","Liquidity spiral"),
 quoi:B("Boucle où vendre fait baisser les prix, ce qui force d'autres ventes, asséchant la liquidité.","A loop where selling lowers prices, forcing more selling, draining liquidity."),
 pourquoi:B("Elle transforme un stress gérable en effondrement ; comprendre la boucle aide à ne pas brader.","It turns a manageable stress into collapse; understanding the loop helps avoid fire sales."),
 histoire:B("Brunnermeier (2009) a formalisé les spirales de 2008.","Brunnermeier (2009) formalised the 2008 spirals."),
 comment:B("Ventes forcées → prix ↓ → appels de marge → nouvelles ventes.","Forced sales → prices ↓ → margin calls → more sales."),
 exemple:B("Un fonds liquide ses positions, faisant chuter le marché et déclenchant d'autres appels de marge.","A fund liquidates, crashing the market and triggering others' margin calls."),
 limites:B("Difficile à enrayer une fois lancée sans intervention.","Hard to stop once started without intervention."),
 quiz:{q:B("La spirale d'illiquidité s'auto-alimente par…","The liquidity spiral self-feeds via…"),opts:[B("la diversification","diversification"),B("les ventes forcées et appels de marge","forced sales and margin calls"),B("la baisse des taux","rate cuts"),B("les dividendes","dividends")],correct:1,exp:B("Ventes → baisse des prix → appels de marge → nouvelles ventes.","Sales → price drops → margin calls → more sales.")}},

/* ---- COUNTERPARTY ---- */
{id:"ccr",mod:"counterparty",part:2,lvl:3,name:B("Risque de contrepartie (CCR)","Counterparty risk (CCR)"),
 quoi:B("Risque que la contrepartie d'un dérivé fasse défaut quand le contrat vous est favorable.","Risk that a derivative's counterparty defaults when the contract is in your favour."),
 pourquoi:B("L'exposition n'est pas le nominal mais la valeur de marché, qui varie chaque jour : plus subtil qu'un prêt.","Exposure isn't the notional but the daily-changing market value: subtler than a loan."),
 histoire:B("AIG en 2008 : incapable d'honorer ses CDS.","AIG in 2008: unable to honour its CDS."),
 comment:B("Exposition = max(valeur de marché, 0).","Exposure = max(market value, 0)."),
 exemple:B("Un swap vous est favorable de 5 M€ ; défaut = 5 M€ perdus.","A swap is +€5M to you; default = €5M lost."),
 limites:B("Wrong-way risk : l'exposition grossit quand la contrepartie va mal.","Wrong-way risk: exposure grows as the counterparty weakens."),
 quiz:{q:B("L'exposition sur un dérivé = ","Exposure on a derivative ="),opts:[B("le nominal","the notional"),B("la valeur de marché si positive","market value if positive"),B("zéro","zero"),B("le taux","the rate")],correct:1,exp:B("On ne perd que le gain non encaissé.","You only lose the unrealised gain.")}},
{id:"pfe",mod:"counterparty",part:2,lvl:4,name:B("Potential Future Exposure (PFE)","Potential Future Exposure (PFE)"),
 quoi:B("Exposition maximale probable à une date future, à un niveau de confiance — une « VaR de l'exposition ».","The likely maximum exposure at a future date, at a confidence level — a 'VaR of exposure'."),
 pourquoi:B("L'exposition d'aujourd'hui peut exploser demain ; on fixe des limites sur la PFE.","Today's exposure can explode tomorrow; limits are set on PFE."),
 histoire:B("Standard pour les limites de trading sur dérivés bilatéraux.","Standard for trading limits on bilateral derivatives."),
 comment:B("On simule l'évolution du contrat et on lit le quantile.","Simulate the contract's path and read the quantile."),
 exemple:B("Exposition 5 M€ aujourd'hui, PFE 30 M€ à 1 an.","Exposure €5M today, PFE €30M at 1 year."),
 limites:B("Dépend du modèle et ignore parfois le wrong-way risk.","Depends on the model and may ignore wrong-way risk."),
 quiz:{q:B("La PFE regarde l'exposition…","PFE looks at exposure…"),opts:[B("aujourd'hui","today"),B("future potentielle","potential future"),B("passée","past"),B("de financement","funding")],correct:1,exp:B("Elle projette un quantile d'exposition future.","It projects a future-exposure quantile.")}},
{id:"cva",mod:"counterparty",part:2,lvl:4,name:B("Credit Valuation Adjustment (CVA)","Credit Valuation Adjustment (CVA)"),
 quoi:B("Ajustement de prix d'un dérivé reflétant le risque de défaut de la contrepartie.","A derivative price adjustment reflecting the counterparty's default risk."),
 pourquoi:B("Un dérivé vaut moins si la contrepartie peut faire défaut ; le CVA met ce coût au bilan.","A derivative is worth less if the counterparty can default; CVA books that cost."),
 histoire:B("Les pertes CVA ont dominé les pertes dérivés de 2008 → charge en capital CVA (Bâle III).","CVA losses dominated 2008 derivatives losses → Basel III CVA capital charge."),
 comment:B("CVA ≈ Σ PD × LGD × exposition attendue actualisée.","CVA ≈ Σ PD × LGD × discounted expected exposure."),
 exemple:B("Swap « valant » 5 M€, CVA 300 k€ → valeur ajustée 4,7 M€.","Swap 'worth' €5M, CVA €300k → adjusted value €4.7M."),
 limites:B("Sensible aux corrélations et dur à couvrir.","Sensitive to correlations and hard to hedge."),
 quiz:{q:B("Le CVA représente…","CVA represents…"),opts:[B("le coût du risque de défaut de la contrepartie","the cost of counterparty default risk"),B("le taux sans risque","the risk-free rate"),B("la marge","the margin"),B("la TVA","VAT")],correct:0,exp:B("Ajustement de prix dû au risque de crédit de la contrepartie.","Price adjustment for the counterparty's credit risk.")}},
{id:"netting",mod:"counterparty",part:2,lvl:3,name:B("Netting & collatéral","Netting & collateral"),
 quoi:B("Le netting compense les positions opposées avec une même contrepartie ; le collatéral garantit le solde.","Netting offsets opposing positions with one counterparty; collateral secures the balance."),
 pourquoi:B("Ils réduisent l'exposition réelle (et le CVA) bien en dessous de la somme des nominaux.","They cut real exposure (and CVA) far below the sum of notionals."),
 histoire:B("Accords ISDA + CSA ; généralisés après 2008.","ISDA + CSA agreements; generalised after 2008."),
 comment:B("Exposition nette = max(Σ valeurs, 0) − collatéral reçu.","Net exposure = max(Σ values, 0) − collateral received."),
 exemple:B("+8 et −5 avec la même contrepartie → exposition nette 3, pas 8.","+8 and −5 with the same counterparty → net exposure 3, not 8."),
 limites:B("Le netting n'est valable que s'il est juridiquement opposable.","Netting only works if legally enforceable."),
 quiz:{q:B("Le netting réduit l'exposition en…","Netting reduces exposure by…"),opts:[B("additionnant les nominaux","summing notionals"),B("compensant les positions opposées","offsetting opposing positions"),B("ignorant le collatéral","ignoring collateral"),B("augmentant la PFE","raising PFE")],correct:1,exp:B("On compense les valeurs opposées avec la même contrepartie.","Offset opposing values with the same counterparty.")}},

/* ---- DERIVATIVES & GREEKS ---- */
{id:"forwardfut",mod:"deriv",part:1,lvl:1,name:B("Forwards & Futures","Forwards & Futures"),
 quoi:B("Engagement d'acheter/vendre à un prix fixé à une date future. Le future est standardisé et compensé.","Commitment to buy/sell at a set price on a future date. The future is standardised and cleared."),
 pourquoi:B("Briques du hedging : verrouiller un prix futur supprime l'incertitude.","Hedging building blocks: locking a future price removes uncertainty."),
 histoire:B("Futures modernes au CME ; chambre de compensation = peu de risque de contrepartie.","Modern futures at the CME; clearing house = little counterparty risk."),
 comment:B("Future : marge quotidienne (mark-to-market).","Future: daily margin (mark-to-market)."),
 exemple:B("Vendre un future EUR/USD pour figer un taux à 3 mois.","Sell an EUR/USD future to lock a 3-month rate."),
 limites:B("Le hedge fige aussi les gains ; appels de marge en cash.","The hedge also locks gains; cash margin calls."),
 quiz:{q:B("Différence clé future vs forward ?","Key difference future vs forward?"),opts:[B("le future est standardisé/compensé","the future is standardised/cleared"),B("le forward est coté","the forward is exchange-listed"),B("aucune","none"),B("le future n'a pas d'échéance","the future has no maturity")],correct:0,exp:B("Future = standardisé, coté, compensé.","Future = standardised, listed, cleared.")}},
{id:"options",mod:"deriv",part:1,lvl:2,name:B("Options (Call & Put)","Options (Call & Put)"),
 quoi:B("Un call = droit d'acheter ; un put = droit de vendre, à un prix fixé, contre une prime.","A call = right to buy; a put = right to sell, at a set price, for a premium."),
 pourquoi:B("Contrairement au forward, l'option laisse profiter du favorable en plafonnant la perte à la prime.","Unlike a forward, an option keeps the upside while capping loss at the premium."),
 histoire:B("CBOE (1973) + Black-Scholes la même année.","CBOE (1973) + Black-Scholes the same year."),
 comment:B("Payoff call = max(prix − strike, 0) − prime.","Call payoff = max(price − strike, 0) − premium."),
 exemple:B("Acheter un put = assurance contre une chute du portefeuille.","Buying a put = insurance against a portfolio drop."),
 limites:B("La prime est un coût certain ; vendre des options = pertes potentiellement illimitées.","The premium is a sure cost; selling options = potentially unlimited losses."),
 quiz:{q:B("L'acheteur d'un call détient…","A call buyer holds…"),opts:[B("l'obligation d'acheter","the obligation to buy"),B("le droit d'acheter","the right to buy"),B("l'obligation de vendre","the obligation to sell"),B("le droit de vendre","the right to sell")],correct:1,exp:B("Un call = droit (non obligation) d'acheter.","A call = right (not obligation) to buy.")}},
{id:"putcall",mod:"deriv",part:1,lvl:3,name:B("Parité put-call","Put-call parity"),
 quoi:B("Relation liant les prix d'un call et d'un put de mêmes strike et échéance : C − P = S − K·e^(−rT).","Relation linking a call and put of same strike/maturity: C − P = S − K·e^(−rT)."),
 pourquoi:B("Elle garantit la cohérence des prix : toute violation crée une opportunité d'arbitrage sans risque.","It enforces price consistency: any violation is a risk-free arbitrage."),
 histoire:B("Principe d'absence d'arbitrage, antérieur à Black-Scholes.","No-arbitrage principle, predating Black-Scholes."),
 comment:B("On peut répliquer un call avec put + sous-jacent + cash.","A call can be replicated with put + underlying + cash."),
 exemple:B("Si la parité est violée, on achète le moins cher et vend le plus cher.","If parity is violated, buy the cheap leg and sell the dear one."),
 limites:B("Suppose pas de dividendes/coûts et des options européennes.","Assumes no dividends/costs and European options."),
 quiz:{q:B("La parité put-call repose sur…","Put-call parity rests on…"),opts:[B("la volatilité","volatility"),B("l'absence d'arbitrage","no-arbitrage"),B("le hasard","randomness"),B("la duration","duration")],correct:1,exp:B("Toute violation serait un arbitrage sans risque.","Any violation would be a risk-free arbitrage.")}},
{id:"delta",mod:"deriv",part:2,lvl:3,name:B("Delta (Greek)","Delta (Greek)"),
 quoi:B("Variation du prix d'une option pour +1 € du sous-jacent (0 à 1 pour un call).","Option price change per +€1 of underlying (0 to 1 for a call)."),
 pourquoi:B("Greek n°1 du hedging : combien de sous-jacent acheter/vendre pour neutraliser le risque directionnel.","The #1 hedging Greek: how much underlying to trade to neutralise directional risk."),
 histoire:B("Dérivée première de Black-Scholes.","First derivative of Black-Scholes."),
 comment:B("Unités à couvrir = − delta du book / delta de l'instrument.","Units to hedge = − book delta / instrument delta."),
 exemple:B("Book delta +500 → vendre 500 sous-jacents.","Book delta +500 → sell 500 underlyings."),
 limites:B("Le delta change avec le marché (gamma) : re-hedge continu.","Delta changes with the market (gamma): continuous re-hedging."),
 quiz:{q:B("Book delta +500. Pour être neutre…","Book delta +500. To be neutral…"),opts:[B("acheter 500","buy 500"),B("vendre 500","sell 500"),B("ne rien faire","do nothing"),B("acheter 250","buy 250")],correct:1,exp:B("Vendre 500 annule l'exposition directionnelle.","Sell 500 cancels the directional exposure.")}},
{id:"gamma",mod:"deriv",part:2,lvl:4,name:B("Gamma (Greek)","Gamma (Greek)"),
 quoi:B("Vitesse à laquelle le delta change quand le sous-jacent bouge.","How fast delta changes as the underlying moves."),
 pourquoi:B("Un book delta-neutre à fort gamma redevient vite risqué : le gamma dit à quelle fréquence re-hedger.","A delta-neutral book with high gamma quickly becomes risky again: gamma tells how often to re-hedge."),
 histoire:B("Dérivée seconde de Black-Scholes.","Second derivative of Black-Scholes."),
 comment:B("Gamma maximal pour les options à la monnaie proches de l'échéance.","Gamma is highest for at-the-money options near expiry."),
 exemple:B("Après +2 %, le delta saute de +500 à +900 → re-hedge urgent.","After +2%, delta jumps +500 to +900 → urgent re-hedge."),
 limites:B("Couvrir le gamma exige d'autres options (coûteux).","Hedging gamma needs other options (costly)."),
 quiz:{q:B("Un fort gamma signifie que le delta…","High gamma means delta…"),opts:[B("ne bouge jamais","never moves"),B("change vite","changes fast"),B("est nul","is zero"),B("= la prime","= the premium")],correct:1,exp:B("Le gamma = vitesse de variation du delta.","Gamma = rate of change of delta.")}},
{id:"vega",mod:"deriv",part:2,lvl:4,name:B("Vega (Greek)","Vega (Greek)"),
 quoi:B("Sensibilité du prix d'une option à la volatilité (par +1 point de vol).","Option price sensitivity to volatility (per +1 vol point)."),
 pourquoi:B("Une option peut perdre de la valeur sans que le sous-jacent bouge, juste si la vol baisse.","An option can lose value without the underlying moving, just if vol falls."),
 histoire:B("Central avec l'essor du trading de volatilité.","Central with the rise of volatility trading."),
 comment:B("Prix ↑ quand la vol ↑ (acheteur d'option = acheteur de vol).","Price ↑ when vol ↑ (option buyer = vol buyer)."),
 exemple:B("Vol 20 %→25 % : une option à fort vega gagne sans mouvement.","Vol 20%→25%: a high-vega option gains with no move."),

const conceptById=(id)=>CONCEPTS.find(c=>c.id===id);
function partLabel(p){ return p===2?"FRM II":"FRM I"; }
/* ===================================================================
   TUTEUR ADAPTATIF + RÉPÉTITION ESPACÉE (SM-2)
   =================================================================== */
function srsOf(id){ if(!S.srs[id]) S.srs[id]={ef:2.5,interval:0,due:S.day,reps:0,seen:0,wrong:0}; return S.srs[id]; }
function learnConcept(id){ if(!S.learned.includes(id)){ S.learned.push(id); srsOf(id); checkBadges(); } }
function srsReview(id, quality){ // quality 0..5
  const c=srsOf(id); c.seen++;
  if(quality<3){ c.reps=0; c.interval=1; c.wrong++; }
  else{ c.reps++; c.interval = c.reps===1?1 : c.reps===2?6 : Math.round(c.interval*c.ef); }
  c.ef = clamp(c.ef + (0.1-(5-quality)*(0.08+(5-quality)*0.02)), 1.3, 2.8);
  c.due = S.day + Math.max(1,c.interval);
}
function dueReviews(){ return CONCEPTS.filter(c=>S.srs[c.id] && S.srs[c.id].due<=S.day); }
// modules "faibles" = peu vus, ou EF bas, ou erreurs — biaise les événements/quizz
function topicMastery(mod){
  const ids=CONCEPTS.filter(c=>c.mod===mod);
  let learnedN=0, ef=0, wrong=0, seen=0;
  for(const c of ids){ const s=S.srs[c.id]; if(s){ learnedN++; ef+=s.ef; wrong+=s.wrong; seen+=s.seen; } }
  const cover=learnedN/Math.max(ids.length,1);
  const avgEf=learnedN?ef/learnedN:2.5;
  const acc=seen?1-(wrong/seen):0.5;
  return clamp(0.45*cover + 0.30*(avgEf-1.3)/1.5 + 0.25*acc, 0, 1);
}
function weakestModules(n){
  return MODULES.map(m=>({m:m.id,score:topicMastery(m.id)})).sort((a,b)=>a.score-b.score).slice(0,n).map(x=>x.m);
}
function adaptiveModule(){ // 55% du temps, cible un module faible
  if(Math.random()<0.55){ const w=weakestModules(3); return pick(w); }
  return pick(MODULES).id;
}
function readiness(){ // score global de préparation à l'examen FRM (0-100)
  const m=MODULES.map(x=>topicMastery(x.id)); const avg=m.reduce((a,b)=>a+b,0)/m.length;
  const examW=clamp(S.examBest/100,0,1);
  return Math.round(clamp(0.7*avg+0.3*examW,0,1)*100);
}

/* ===================================================================
   QUIZ / EXAMEN / RÉVISION
   =================================================================== */
let quizState=null;
function startConceptQuiz(id){
  const c=conceptById(id); if(!c)return;
  const order=shuffle(c.quiz.opts.map((o,i)=>({o,i})));
  quizState={mode:"concept",id,c,order,answered:false};
  renderQuizSheet();
}
function renderQuizSheet(){
  const c=quizState.c;
  let h=`<button class="x" onclick="closeSheet()">✕</button>`;
  h+=`<div class="kicker">${esc(modName(c.mod))} · ${partLabel(c.part)}</div>`;
  h+=`<h3>${esc(t("Quiz","Quiz"))} — ${esc(L(c.name))}</h3>`;
  h+=`<p style="color:var(--muted);font-size:14.5px;margin:6px 0 14px">${esc(L(c.quiz.q))}</p>`;
  quizState.order.forEach((it,k)=>{
    h+=`<button class="qopt" id="qo${k}" onclick="answerQuiz(${k})"><span class="qk">${String.fromCharCode(65+k)}</span><span>${esc(L(it.o))}</span></button>`;
  });
  h+=`<div id="qfb"></div>`;
  openSheet(h);
}
function answerQuiz(k){
  if(quizState.answered)return; quizState.answered=true;
  const c=quizState.c, chosen=quizState.order[k].i, correct=c.quiz.correct;
  S.quiz.total++; const ok=chosen===correct;
  quizState.order.forEach((it,idx)=>{
    const el=$("qo"+idx); if(!el)return;
    if(it.i===correct) el.classList.add("right");
    else if(idx===k) el.classList.add("wrong");
  });
  if(ok) S.quiz.correct++;
  srsReview(quizState.id, ok?5:2);
  learnConcept(quizState.id);
  const fb=$("qfb");
  if(fb) fb.innerHTML=`<div class="qfb ${ok?'ok':'no'}">${ok?'✓ '+t("Correct !","Correct!"):'✕ '+t("Pas tout à fait.","Not quite.")} ${esc(L(c.quiz.exp))}</div>
    <div class="btnrow"><button class="btn sec sm" onclick="openConcept('${c.id}')">${t("Revoir la fiche","Review card")}</button><button class="btn sm" onclick="closeSheet()">${t("OK","OK")}</button></div>`;
  addXP(ok?12:4); save(); refresh();
}

/* ---- Examen blanc & révision (SM-2 + erreurs) ---- */
let examState=null;
function buildQuestionPool(ids){
  return ids.map(id=>{const c=conceptById(id);const order=shuffle(c.quiz.opts.map((o,i)=>({o,i})));return {id,c,order};});
}
function startExam(){
  const pool = S.learned.length>=6 ? S.learned : CONCEPTS.map(c=>c.id);
  const ids=shuffle(pool).slice(0,10);
  examState={mode:"exam",list:buildQuestionPool(ids),idx:0,score:0,answered:false,wrong:[]};
  renderExam();
}
function startReview(){
  const due=dueReviews().map(c=>c.id);
  const pool = due.length? due : (S.learned.length? S.learned : CONCEPTS.map(c=>c.id));
  const ids=shuffle(pool).slice(0,Math.min(12,pool.length));
  examState={mode:"review",list:buildQuestionPool(ids),idx:0,score:0,answered:false,wrong:[]};
  renderExam();
}
function renderExam(){
  const st=examState, q=st.list[st.idx], c=q.c, n=st.list.length;
  const title = st.mode==="exam"?t("Examen blanc FRM","FRM mock exam"):t("Révision du jour","Daily review");
  let h=`<button class="x" onclick="closeExam()">✕</button>`;
  h+=`<div class="kicker">${esc(title)} · ${st.idx+1}/${n}</div>`;
  h+=`<div class="exam-prog"><div style="width:${(st.idx/n)*100}%"></div></div>`;
  h+=`<div style="font-size:11px;color:var(--muted);margin-bottom:4px">${esc(modName(c.mod))} · ${partLabel(c.part)}</div>`;
  h+=`<h3 style="font-size:17px">${esc(L(c.quiz.q))}</h3><div class="spacer"></div>`;
  q.order.forEach((it,k)=>{ h+=`<button class="qopt" id="eo${k}" onclick="examAnswer(${k})"><span class="qk">${String.fromCharCode(65+k)}</span><span>${esc(L(it.o))}</span></button>`; });
  h+=`<div id="efb"></div>`;
  openSheet(h); st.answered=false;
}
function examAnswer(k){
  const st=examState; if(st.answered)return; st.answered=true;
  const q=st.list[st.idx], correct=q.c.quiz.correct, chosen=q.order[k].i, ok=chosen===correct;
  q.order.forEach((it,idx)=>{const el=$("eo"+idx);if(!el)return; if(it.i===correct)el.classList.add("right"); else if(idx===k)el.classList.add("wrong");});
  S.quiz.total++; if(ok){S.quiz.correct++; st.score++;} else st.wrong.push(q.id);
  srsReview(q.id, ok?5:2); learnConcept(q.id);
  const fb=$("efb"), last=st.idx>=st.list.length-1;
  if(fb) fb.innerHTML=`<div class="qfb ${ok?'ok':'no'}">${ok?'✓':'✕'} ${esc(L(q.c.quiz.exp))}</div>
    <button class="btn sm" onclick="examNext()">${last?t("Voir le résultat","See result"):t("Suivant","Next")}</button>`;
  save();
}
function examNext(){ const st=examState; if(st.idx>=st.list.length-1){ examResults(); return; } st.idx++; renderExam(); }
function examResults(){
  const st=examState, n=st.list.length, pct=Math.round(st.score/n*100);
  if(st.mode==="promo"){
    const passed=pct>=70;
    let h=`<button class="x" onclick="closeExam()">✕</button><div class="kicker">${t("Examen de promotion","Promotion exam")}</div>`;
    h+=`<h3>${pct}% — ${st.score}/${n}</h3>`;
    if(passed){ doPromote(); h+=`<p style="color:var(--good)">✓ ${t("Réussi ! Tu accèdes au grade de","Passed! You are promoted to")} <b>${esc(L(rankOf(S.rankIdx)))}</b>. ${t("Ta banque grandit — nouveaux défis.","Your bank grows — new challenges.")}</p>`; }
    else { h+=`<p style="color:var(--warn)">${t("Pas encore : il faut ≥ 70 %. Révise tes points faibles et retente.","Not yet: you need ≥ 70%. Review your weak spots and retry.")}</p>`; }
    h+=`<div class="btnrow"><button class="btn" onclick="closeExam()">${t("Continuer","Continue")}</button></div>`;
    openSheet(h); save(); refresh(); return;
  }
  if(st.mode==="exam" && pct>S.examBest){ S.examBest=pct; }
  if(S.today){ if(st.mode==="review")S.today.reviewed++; else S.today.examed++; }
  let xp=st.score*10 + (pct>=70?40:0); addXP(xp);
  let verdict = pct>=80?t("Excellent — niveau FRM solide.","Excellent — solid FRM level."):pct>=70?t("Réussi. Continue à réviser tes points faibles.","Passed. Keep reviewing your weak spots."):t("À retravailler — la révision espacée va cibler tes lacunes.","Needs work — spaced review will target your gaps.");
  let h=`<button class="x" onclick="closeExam()">✕</button><div class="kicker">${st.mode==="exam"?t("Résultat d'examen","Exam result"):t("Révision terminée","Review done")}</div>`;
  h+=`<h3>${pct}% — ${st.score}/${n}</h3><p style="color:var(--muted)">${esc(verdict)}</p>`;
  h+=`<div class="calc-out"><div class="co-v">${readiness()}%</div><div class="co-l">${t("Préparation FRM estimée","Estimated FRM readiness")}</div></div>`;

const HEDGE_TYPES={
 future:{ic:"📉",name:B("Future (delta-hedge)","Future (delta hedge)"),eff:0.7,gamma:0.10,thetaPct:0.0,costPct:0.004,
   note:B("Couverture directionnelle peu chère, mais delta dérive vite (gamma).","Cheap directional hedge, but delta drifts fast (gamma).")},
 put:{ic:"🛡️",name:B("Put (assurance)","Put (insurance)"),eff:0.85,gamma:0.05,thetaPct:0.012,costPct:0.018,
   note:B("Protège la baisse en gardant la hausse, mais perd de la valeur (theta).","Protects the downside, keeps upside, but decays (theta).")},
 cds:{ic:"💳",name:B("CDS (couverture crédit)","CDS (credit hedge)"),eff:0.6,gamma:0.03,thetaPct:0.004,costPct:0.010,
   note:B("Réduit le risque de crédit/contrepartie ; crée un risque sur le vendeur.","Cuts credit/counterparty risk; creates risk on the seller.")},
};
function placeHedge(type){
  const def=HEDGE_TYPES[type]; if(!def)return;
  const notional = Math.round(riskyBook(S)*rnd(0.18,0.32));
  const cost = Math.round(notional*def.costPct);
  if(S.bs.cash < cost){ toast(t("Cash insuffisant pour cette couverture.","Not enough cash for this hedge.")); return; }
  S.bs.cash -= cost;
  S.hedges.push({id:"h"+Date.now()+Math.floor(Math.random()*999),type,notional,eff:def.eff,drift:0,gamma:def.gamma,thetaPct:def.thetaPct,daysLeft:ri(20,45)});
  if(type==="cds"){ S.metrics.counterparty=clamp(S.metrics.counterparty*0.85,0.1,40); S.metrics.creditRisk=clamp(S.metrics.creditRisk*0.92,0.1,40); }
  S.counters.hedgesPlaced++; recalc(S); checkBadges(); save(); toast(L(def.name)+" "+t("placé","placed")+" · −"+money(cost)); refresh();
}
function rebalanceHedge(id){
  const h=S.hedges.find(x=>x.id===id); if(!h)return;
  const cost=Math.round(h.notional*0.003*(1+h.drift));
  if(S.bs.cash<cost){ toast(t("Cash insuffisant pour rééquilibrer.","Not enough cash to rebalance.")); return; }
  S.bs.cash-=cost; h.drift=0; S.counters.rebalances++; recalc(S); checkBadges(); save();
  toast(t("Rééquilibré — delta neutralisé.","Rebalanced — delta neutral.")+" −"+money(cost)); refresh();
}
function closeHedge(id){ S.hedges=S.hedges.filter(x=>x.id!==id); recalc(S); save(); refresh(); }
function driftHedges(marketMove){
  for(const h of S.hedges){
    h.drift = clamp(h.drift + h.gamma*Math.abs(marketMove)*rnd(0.6,1.4), 0, 1);
    if(h.thetaPct>0){ S.bs.cash -= Math.round(h.notional*h.thetaPct/30); } // érosion theta quotidienne
    h.daysLeft--;
  }
  S.hedges=S.hedges.filter(h=>h.daysLeft>0);
}

function genSeed(mod){
  const arr=DECISIONS[mod];
  if(!arr||!arr.length) return {id:"e"+Date.now()+Math.floor(Math.random()*99999),mod,generic:true};
  const di=ri(0,arr.length-1);
  const bad=Math.random()<0.5;
  const base=ri(60,95), series=[];
  for(let i=0;i<6;i++){ let v= bad? base*(1+i*rnd(0.05,0.11)) : base*(1+(Math.random()-0.5)*0.07); series.push(Math.round(v)); }
  const p={bad,series,a:Math.round(riskyBook(S)*rnd(0.06,0.16)),pd:+rnd(2,7).toFixed(1)};
  return {id:"e"+Date.now()+Math.floor(Math.random()*99999),mod,di,p};
}
function eventFromSeed(seed){
  const e = seed.generic ? genericEvent(seed.mod) : DECISIONS[seed.mod][seed.di](seed.p);
  e.id=seed.id; e.mod=seed.mod; return e;
}

   case "hedge": return Math.min(S.today.hedged,m.target);
   case "lcr": return S.metrics.lcr>=1?1:0;

}
function missionDone(m){ return missionProgress(m)>=m.target; }
function checkMissions(){
  for(const m of S.missions){ if(!m.claimed && missionDone(m)){ m.claimed=true; addXP(m.reward); S.counters.missionsDone++; toast("✓ "+t("Mission","Mission")+" : +"+m.reward+" XP"); } }

function startPromotionExam(){

  const pool=CONCEPTS.filter(c=>wm.includes(c.mod) || S.learned.includes(c.id)).map(c=>c.id);
  const ids=shuffle(pool.length>=8?pool:CONCEPTS.map(c=>c.id)).slice(0,10);

}
function doPromote(){
  if(S.rankIdx>=RANKS.length-1)return;
  S.rankIdx++; S.counters.promotions++; S.pendingExamPassed=false;
  // la banque grandit → plus de complexité
  const g=1.55; for(const k in S.bs){ S.bs[k]*=g; }
  recalc(S); checkBadges(); save();

/* ===================================================================
   SURVIE DE CRISE — sous-boucle de 30 jours
   =================================================================== */
function ensureSolvent(){
  const TA=totalAssets(S), floor=TA*0.025;
  if(S.metrics.capital < floor){
    const target=TA*0.06;
    const inject=Math.max(target - S.metrics.capital, TA*0.04); // injection proportionnelle au déficit
    S.bs.cash += inject; S.counters.recaps++; recalc(S);
    toast("⚠️ "+t("Recapitalisation d'urgence","Emergency recapitalisation")+" +"+money(inject));
  }
}
function triggerCrisis(){
  const cr=pick(CRISES);
  applyShock(S, cr.mag, cr.rho);
  ensureSolvent();
  S.crisis=cr.id;
  S.survival={daysLeft:30, crisisId:cr.id, startCap:S.metrics.capital};
  save();
  openCrisisSheet(cr);
}
function survivalTick(){
  if(!S.survival)return;
  const after = rnd(0.005,0.02) * (S.survival.daysLeft/30); // répliques décroissantes
  if(Math.random()<0.55){ applyShock(S, after, S.rho); ensureSolvent(); }
  S.rho = clamp(S.rho - 0.01, 0.25, 0.92); // les corrélations se normalisent lentement
  S.survival.daysLeft--;
  if(S.survival.daysLeft<=0){
    S.counters.crisesSurvived++; S.survival=null; S.crisis=null; S.rho=0.3;
    addXP(120); checkBadges(); save();
    toast("🛡️ "+t("Crise surmontée ! +120 XP","Crisis survived! +120 XP"));
  }
}

   =================================================================== */
function diffMul(){ return S.settings.difficulty==="tranquille"?0.5:S.settings.difficulty==="expert"?1.8:1; }
function eventModule(){ // 70% un module à décisions riches (biaisé vers les faibles), sinon module faible quelconque
  if(Math.random()<0.7){ const dm=decisionMods(); const weak=weakestModules(4).filter(m=>dm.includes(m)); const pool=weak.length?weak:dm; return pick(pool); }
  return adaptiveModule();
}
function genDay(s){
  s=s||S;
  s.today={events:0,studied:0,reviewed:0,hedged:0,examed:0,studyByMod:{}};
  const n = clamp(Math.round(rnd(2,4)*(s.settings.difficulty==="expert"?1.3:1)),2,5);
  s.events=[]; for(let i=0;i<n;i++){ s.events.push(genSeed(eventModule())); }
  s.missions=genMissions();
  genBossTasks(s);
}
function nextDay(){
  const move = rnd(-0.012,0.012)*(1+ (diffMul()-1)*0.4);
  // rendements passifs & accruals
  S.bs.securities *= (1+move); S.bs.deriv *= (1+move*1.3);
  const carry = S.metrics.rendement/100/252;
  S.bs.cash += (S.bs.loansCorp+S.bs.loansRetail)*carry*0.4;
  // mean-reversion douce
  S.metrics.opRisk += (1.8-S.metrics.opRisk)*0.05;
  S.metrics.counterparty += (2.1-S.metrics.counterparty)*0.05;
  S.bookPD += (3.0-S.bookPD)*0.04;
  if(!S.survival) S.rho += (0.25-S.rho)*0.08;
  driftHedges(move);
  recalc(S);
  // historique
  S.history.push(snapshot(S)); if(S.history.length>60)S.history.shift();
  // solvabilité → recapitalisation d'urgence (proportionnelle)
  ensureSolvent();
  // survie / déclenchement de crise
  if(S.survival){ survivalTick(); ensureSolvent(); }
  else {
    const prob = clamp(0.013 + S.rankIdx*0.0035, 0.013, 0.06)*diffMul();
    if(Math.random()<prob){ S.day++; genDay(S); checkBadges(); save(); triggerCrisis(); refresh(); return; }
  }
  S.day++; genDay(S); checkBadges(); save(); refresh();
}

   VISUALISATIONS INTERACTIVES (SVG + sliders)
   =================================================================== */
function npdf(x){ return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI); }
function ninv(p){ // inverse normal CDF (Acklam)
  if(p<=0)return -6; if(p>=1)return 6;
  const a=[-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
  const b=[-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
  const c=[-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
  const d=[7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
  const pl=0.02425,ph=1-pl; let q,r;
  if(p<pl){q=Math.sqrt(-2*Math.log(p));return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
  if(p<=ph){q=p-0.5;r=q*q;return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}
  q=Math.sqrt(-2*Math.log(1-p));return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
}
function lossDistSVG(conf){
  const sigma = Math.max(S.metrics.var99/2.33, 1e6);
  const z=ninv(conf/100), VaR=sigma*z, ES=sigma*npdf(z)/(1-conf/100);
  const W=460,H=210,padB=26,padT=8,padL=8,padR=8;
  const xmin=-4*sigma, xmax=3*sigma, span=xmax-xmin;
  const X=(v)=>padL+(v-xmin)/span*(W-padL-padR);
  const bins=49; let maxd=npdf(0); let bars="";
  for(let i=0;i<bins;i++){
    const x0=xmin+span*i/bins, x1=xmin+span*(i+1)/bins, mid=(x0+x1)/2;
    const dens=npdf(mid/sigma); const h=(dens/maxd)*(H-padB-padT);
    const loss=-mid; // perte = côté gauche (mid négatif)
    let col="var(--brand)";
    if(loss>=VaR && loss<ES) col="var(--warn)";
    if(loss>=ES) col="var(--crit)";
    const bx=X(x0), bw=Math.max(1,X(x1)-X(x0)-1);
    bars+=`<rect x="${bx.toFixed(1)}" y="${(H-padB-h).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="${col}" opacity="0.85"/>`;
  }
  const xVaR=X(-VaR), xES=X(-ES);
  const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
   ${bars}
   <line x1="${xVaR}" y1="${padT}" x2="${xVaR}" y2="${H-padB}" stroke="var(--warn)" stroke-width="2" stroke-dasharray="4 3"/>
   <line x1="${xES}" y1="${padT}" x2="${xES}" y2="${H-padB}" stroke="var(--crit)" stroke-width="2" stroke-dasharray="4 3"/>
   <text x="${clamp(xVaR,30,W-30)}" y="${padT+12}" fill="var(--warn)" font-size="10" font-family="monospace" text-anchor="middle">VaR</text>
   <text x="${clamp(xES,30,W-30)}" y="${padT+12}" fill="var(--crit)" font-size="10" font-family="monospace" text-anchor="middle">ES</text>
   <line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="var(--line)"/>
   <text x="${X(0)}" y="${H-8}" fill="var(--faint)" font-size="9" font-family="monospace" text-anchor="middle">${t("gain","gain")} ⟵ 0 ⟶ ${t("perte","loss")}</text>
  </svg>`;
  return {svg,VaR,ES};
}
function renderLossDist(){
  const conf=+($("ldConf")?$("ldConf").value:99);
  const {svg,VaR,ES}=lossDistSVG(conf);
  const wrap=$("ldSvg"); if(wrap)wrap.innerHTML=svg;

function yieldCurveSVG(shift,steep){
  const ten=[0.25,1,2,5,10,30], base=[3.0,3.2,3.45,3.7,3.9,4.1];
  const W=460,H=180,padL=30,padR=10,padT=10,padB=24;
  const xmax=30, ymin=1, ymax=7;
  const X=(t2)=>padL+(Math.log(t2)+1.4)/(Math.log(30)+1.4)*(W-padL-padR);
  const Y=(y)=>padT+(1-(y-ymin)/(ymax-ymin))*(H-padT-padB);
  const shocked=base.map((y,i)=>y+shift/100+steep/100*((ten[i]-5)/25));
  const poly=(arr)=>arr.map((y,i)=>`${X(ten[i]).toFixed(1)},${Y(y).toFixed(1)}`).join(" ");
  let grid=""; for(let yy=2;yy<=6;yy++){grid+=`<line x1="${padL}" y1="${Y(yy)}" x2="${W-padR}" y2="${Y(yy)}" stroke="var(--line)" stroke-width="0.5"/><text x="${padL-4}" y="${Y(yy)+3}" fill="var(--faint)" font-size="8" font-family="monospace" text-anchor="end">${yy}%</text>`;}
  let xlab=""; [0.25,2,5,10,30].forEach(tt=>{xlab+=`<text x="${X(tt)}" y="${H-8}" fill="var(--faint)" font-size="8" font-family="monospace" text-anchor="middle">${tt<1?"3M":tt+"a"}</text>`;});
  const dAvg=shift/100 + steep/100*0; const dur=6, conv=65;
  const pnl = (-dur*(dAvg/100) + 0.5*conv*Math.pow(dAvg/100,2));
  const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${grid}${xlab}
   <polyline points="${poly(base)}" fill="none" stroke="var(--faint)" stroke-width="1.5" stroke-dasharray="4 3"/>
   <polyline points="${poly(shocked)}" fill="none" stroke="var(--brand)" stroke-width="2.5"/>
  </svg>`;
  return {svg,pnl};
}

function deltaRows(b,a){

function openCalcVaR(){
  let h=`<button class="x" onclick="closeSheet()">✕</button><div class="kicker">${t("Calculateur","Calculator")}</div><h3>VaR ${t("paramétrique","parametric")}</h3>`;
  h+=`<div class="calc-field"><label>${t("Valeur du portefeuille (€)","Portfolio value (€)")}</label><input id="cv_v" type="number" value="500000000" oninput="calcVaR()"></div>`;
  h+=`<div class="calc-field"><label>${t("Volatilité journalière (%)","Daily volatility (%)")}</label><input id="cv_s" type="number" value="2" step="0.1" oninput="calcVaR()"></div>`;
  h+=`<div class="calc-field"><label>${t("Confiance","Confidence")}</label><select id="cv_c" onchange="calcVaR()"><option value="1.645">95%</option><option value="2.33" selected>99%</option><option value="3.09">99.9%</option></select></div>`;
  h+=`<div class="calc-out"><div class="co-v" id="cv_o">—</div><div class="co-l">VaR</div></div>`;
  openSheet(h); calcVaR();
}
function calcVaR(){ const v=+$("cv_v").value,s=+$("cv_s").value/100,z=+$("cv_c").value; if($("cv_o"))$("cv_o").textContent=money(v*s*z); }
function openCalcEL(){
  let h=`<button class="x" onclick="closeSheet()">✕</button><div class="kicker">${t("Calculateur","Calculator")}</div><h3>Expected Loss</h3>`;
  h+=`<div class="calc-field"><label>PD (%)</label><input id="el_pd" type="number" value="3.2" step="0.1" oninput="calcEL()"></div>`;
  h+=`<div class="calc-field"><label>LGD (%)</label><input id="el_lgd" type="number" value="45" oninput="calcEL()"></div>`;
  h+=`<div class="calc-field"><label>EAD (€)</label><input id="el_ead" type="number" value="50000000" oninput="calcEL()"></div>`;
  h+=`<div class="calc-out"><div class="co-v" id="el_o">—</div><div class="co-l">EL = PD × LGD × EAD</div></div>`;
  openSheet(h); calcEL();
}
function calcEL(){ const pd=+$("el_pd").value/100,lgd=+$("el_lgd").value/100,ead=+$("el_ead").value; if($("el_o"))$("el_o").textContent=money(pd*lgd*ead)+"/an"; }
function openCalcDur(){
  let h=`<button class="x" onclick="closeSheet()">✕</button><div class="kicker">${t("Calculateur","Calculator")}</div><h3>Duration</h3>`;
  h+=`<div class="calc-field"><label>${t("Duration modifiée","Modified duration")}</label><input id="du_d" type="number" value="6" step="0.1" oninput="calcDur()"></div>`;
  h+=`<div class="calc-field"><label>${t("Variation des taux (%)","Rate change (%)")}</label><input id="du_y" type="number" value="1" step="0.1" oninput="calcDur()"></div>`;
  h+=`<div class="calc-field"><label>${t("Valeur (€)","Value (€)")}</label><input id="du_v" type="number" value="100000000" oninput="calcDur()"></div>`;
  h+=`<div class="calc-out"><div class="co-v" id="du_o">—</div><div class="co-l">Δ ${t("prix","price")}</div></div>`;
  openSheet(h); calcDur();
}
function calcDur(){ const d=+$("du_d").value,y=+$("du_y").value/100,v=+$("du_v").value; const dp=-d*y*v; if($("du_o")){$("du_o").textContent=money(dp);$("du_o").style.color=dp>=0?"var(--good)":"var(--crit)";} }
function openStress(){
  const m=S.metrics;
  const scen=[{n:B("Krach −20% actions","−20% equity crash"),f:()=>S.bs.securities*0.2+S.bs.deriv*0.15},{n:B("Taux +200 bp","Rates +200 bp"),f:()=>S.bs.securities*0.10},{n:B("Défauts ×2","Defaults ×2"),f:()=>S.bs.loansCorp*0.04},{n:B("Run liquidité","Liquidity run"),f:()=>S.bs.deposits*0.12}];
  let h=`<button class="x" onclick="closeSheet()">✕</button><div class="kicker">${t("Outil","Tool")}</div><h3>${t("Stress test du portefeuille","Portfolio stress test")}</h3>`;
  h+=`<p style="color:var(--muted);font-size:13px">${t("Pertes estimées par scénario, vs capital","Estimated losses per scenario, vs capital")} ${money(m.capital)}</p>`;
  scen.forEach(sc=>{ const loss=sc.f(); const sev=loss>m.capital*0.5?"var(--crit)":loss>m.capital*0.25?"var(--warn)":"var(--good)";
    h+=`<div class="prow"><span class="nm">${esc(L(sc.n))}</span><span class="amt" style="color:${sev}">−${money(loss)}<small>${(loss/m.capital*100).toFixed(0)}% ${t("du capital","of capital")}</small></span></div>`; });
  h+=`<div class="btnrow"><button class="btn sec sm" onclick="openLossDist()">${t("Voir VaR/ES","See VaR/ES")}</button><button class="btn sm" onclick="closeSheet()">${t("Fermer","Close")}</button></div>`;
  openSheet(h);
}

function miniChartSVG(kind,labels,series,cap){
  const W=460,H=152,pL=34,pR=10,pT=10,pB=24;
  let svg="";
  const ax=(ymin,ymax)=>{ let g=""; for(let i=0;i<=3;i++){const y=pT+(H-pT-pB)*i/3; const val=ymax-(ymax-ymin)*i/3; g+=`<line x1="${pL}" y1="${y.toFixed(1)}" x2="${W-pR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="0.5"/><text class="miniaxis" x="${pL-4}" y="${(y+3).toFixed(1)}" text-anchor="end">${Math.round(val)}</text>`;} return g; };
  if(kind==="scatter"){
    const pts=series[0].points; const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
    const xmin=Math.min(...xs)*0.8,xmax=Math.max(...xs)*1.1,ymin=Math.min(...ys)*0.8,ymax=Math.max(...ys)*1.1;
    const X=v=>pL+(v-xmin)/((xmax-xmin)||1)*(W-pL-pR), Y=v=>pT+(1-(v-ymin)/((ymax-ymin)||1))*(H-pT-pB);
    svg+=ax(ymin,ymax);
    pts.forEach((p,i)=>{ svg+=`<circle cx="${X(p.x).toFixed(1)}" cy="${Y(p.y).toFixed(1)}" r="6" fill="${series[0].color||'var(--brand)'}" opacity="0.85"/><text class="miniaxis" x="${X(p.x).toFixed(1)}" y="${(Y(p.y)-9).toFixed(1)}" text-anchor="middle">${esc(labels[i]||"")}</text>`; });
  } else {
    let allv=[]; series.forEach(s=>allv=allv.concat(s.values));
    const ymin=Math.min(...allv,0), ymax=Math.max(...allv)*1.12||1;
    const n=labels.length, X=i=>pL+(n<=1?0.5:i/(n-1))*(W-pL-pR), Y=v=>pT+(1-(v-ymin)/((ymax-ymin)||1))*(H-pT-pB);
    svg+=ax(ymin,ymax);
    labels.forEach((lb,i)=>{ svg+=`<text class="miniaxis" x="${(pL+(n<=1?0.5:i/(n-1))*(W-pL-pR)).toFixed(1)}" y="${H-8}" text-anchor="middle">${esc(lb)}</text>`; });
    if(kind==="bar"){
      const bw=(W-pL-pR)/n*0.6;
      series[0].values.forEach((v,i)=>{ const cx=pL+(i+0.5)/n*(W-pL-pR); const y=Y(v),h=(H-pB)-y; svg+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(1,h).toFixed(1)}" rx="3" fill="${series[0].color||'var(--brand)'}" opacity="0.85"/>`; });
    } else {
      series.forEach(s=>{ const d=s.values.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" "); svg+=`<polyline points="${d}" fill="none" stroke="${s.color||'var(--brand)'}" stroke-width="2.5" stroke-linejoin="round"/>`; s.values.forEach((v,i)=>svg+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3" fill="${s.color||'var(--brand)'}"/>`); });
    }
  }
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;margin:6px 0">${svg}</svg>`+(cap?`<div style="font-size:11px;color:var(--muted);text-align:center;margin-top:-2px">${esc(L(cap))}</div>`:"");
}
